<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ท่องได้ง่ายนิดเดียว</title>
<!--
  เวอร์ชัน 2: ธีมเขียว-ขาว-ชมพู + หมวดหมู่ที่จัดการเองได้ + ตั้งค่าร้าน (ชื่อ/โลโก้/พื้นหลัง/ฟอนต์)

  วิธี deploy:
  1) ใช้ Firebase project เดิม (flashcardnc) ที่ตั้งไว้แล้วได้เลย ไม่ต้องสร้างใหม่
  2) เพิ่ม node ใหม่ "categories" และ "settings" ใน Security Rules — ไปที่ Realtime Database > Rules
     วางอันนี้แทนของเดิม แล้ว Publish:
     {
       "rules": {
         "sets": { ".read": true, ".write": "auth != null" },
         "categories": { ".read": true, ".write": "auth != null" },
         "settings": { ".read": true, ".write": "auth != null" },
         "links": {
           ".read": "auth != null",
           ".write": "auth != null",
           "$code": { ".read": true }
         }
       }
     }
  3) อัปโหลดไฟล์นี้ทับไฟล์ index.html เดิมบน GitHub (ใช้ "Add file > Upload files" แล้วเลือกชื่อไฟล์เดิม
     จะถามว่าจะ replace ไหม กด Commit ได้เลย ไม่ต้องแก้โค้ดในเบราว์เซอร์)
  4) ข้อมูลเดิม (ชุดบัตร/ลิงก์ ถ้ามี) จะยังอยู่ เพราะเก็บใน Firebase ไม่ได้เก็บในไฟล์นี้
  5) Login แอดมินใช้อีเมล/รหัสผ่านเดิมที่ตั้งไว้ใน Authentication ได้เลย
-->
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=Noto+Serif+Thai:wght@500;700&family=Sriracha&family=Charmonman:wght@400;700&family=Itim&family=Mali:wght@400;600;700&family=Pattaya&display=swap');
:root{
  --green:#3FAE76; --green-deep:#2D8158; --green-100:#E4F7EC; --green-200:#C9EEDA;
  --pink:#FF8FAB; --pink-deep:#E06B8B; --pink-100:#FFE7EE; --pink-200:#FFD0DE;
  --ink:#2C3A33; --ink-soft:#65786E; --ink-faint:#8B9C92;
  --border:#DCEFE2; --border-2:#CDE9D8; --white:#FFFFFF;
  --red-bg:#FFE3E3; --red-text:#C23A3A;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Noto Sans Thai',sans-serif;color:var(--ink);}
.shell{min-height:100vh;display:flex;flex-direction:column;background-color:#fff;
  background-image:
    radial-gradient(circle at 12% 18%, rgba(255,143,171,.16) 0 9px, transparent 10px),
    radial-gradient(circle at 78% 8%, rgba(63,174,118,.14) 0 11px, transparent 12px),
    radial-gradient(circle at 60% 70%, rgba(255,143,171,.13) 0 7px, transparent 8px),
    radial-gradient(circle at 25% 85%, rgba(63,174,118,.13) 0 8px, transparent 9px),
    radial-gradient(circle at 92% 55%, rgba(255,143,171,.12) 0 6px, transparent 7px);
  background-size: 260px 260px, 300px 300px, 220px 220px, 240px 240px, 200px 200px;
  background-repeat:repeat;
}
.wrap{max-width:640px;margin:0 auto;width:100%;padding:0 20px;}
.header{padding:22px 0;}
.row{display:flex;align-items:center;gap:12px;}
.title-lg{font-size:27px;color:var(--ink);margin:0;}
.muted{color:var(--ink-soft);font-size:12px;margin:2px 0 0;}
.bar{background:rgba(255,255,255,.7);backdrop-filter:blur(2px);border-top:2px dashed var(--border-2);border-bottom:2px dashed var(--border-2);padding:18px 0;}
.input{width:100%;background:#fff;border:2px solid var(--border-2);border-radius:12px;padding:9px 12px;font-size:13px;color:var(--ink);outline:none;font-family:inherit;}
.input:focus{border-color:var(--green);}
.code-row{display:flex;gap:8px;flex-wrap:wrap;}
.code-box{flex:1;display:flex;align-items:center;gap:8px;background:#fff;border:2px solid var(--border-2);border-radius:12px;padding:9px 12px;min-width:200px;}
.code-box input{border:none;outline:none;flex:1;font-size:14px;letter-spacing:2px;text-transform:uppercase;font-family:inherit;background:transparent;color:var(--ink);}
.btn{border:none;border-radius:999px;font-size:14px;font-weight:600;padding:10px 20px;cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 3px 0 var(--green-deep);}
.btn-pink{background:var(--pink);color:#fff;box-shadow:0 3px 0 var(--pink-deep);}
.btn-primary:disabled,.btn-pink:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
.btn-ghost{background:transparent;color:var(--ink-soft);text-decoration:underline;padding:6px 0;font-size:13px;border:none;font-family:inherit;cursor:pointer;}
.btn-icon{background:#fff;border:2px solid var(--border-2);border-radius:999px;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);}
.btn-icon:disabled{opacity:.3;cursor:not-allowed;}
.main{flex:1;padding:24px 0;}
.subject{border:2px solid var(--border-2);border-radius:18px;overflow:hidden;background:#fff;margin-bottom:14px;box-shadow:0 3px 0 var(--green-200);}
.subject-head{width:100%;background:none;border:none;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;font-family:inherit;}
.subject-name{font-size:18px;color:var(--ink);}
.set-row{display:flex;gap:14px;padding:16px 18px;border-top:2px dashed var(--border);}
.seal{flex-shrink:0;width:48px;height:48px;border-radius:999px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--pink-200),var(--green-200));border:3px solid #fff;color:var(--ink);font-weight:700;font-size:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.10);}
.seal.lg{width:64px;height:64px;font-size:14px;}
.logo-img{width:44px;height:44px;border-radius:999px;object-fit:cover;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.10);}
.set-title{font-weight:600;font-size:15px;margin:0;}
.set-desc{color:var(--ink-soft);font-size:13px;margin:5px 0 0;}
.set-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--ink-faint);margin-top:8px;align-items:center;}
.footer{border-top:2px dashed var(--border-2);padding:16px 0;display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:12px;color:var(--ink-faint);}
.flip-outer{width:100%;max-width:380px;height:240px;margin:0 auto;perspective:1200px;cursor:pointer;}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d;}
.flip-inner.flipped{transform:rotateY(180deg);}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;display:flex;align-items:center;justify-content:center;background:#fffdf8;color:#2C3A33;border:3px dashed var(--pink-200);overflow:hidden;text-align:center;padding:0 20px;}
.flip-face.back{transform:rotateY(180deg);border-color:var(--green-200);}
.flip-hint{position:absolute;bottom:10px;right:14px;font-size:11px;color:var(--ink-faint);z-index:2;}
.watermark-layer{position:absolute;inset:-20%;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr);transform:rotate(-22deg);opacity:.14;pointer-events:none;z-index:0;}
.watermark-text{font-size:11px;font-weight:700;color:var(--pink-deep);white-space:nowrap;display:flex;align-items:center;justify-content:center;}
@media(prefers-reduced-motion:reduce){.flip-inner{transition:none;}}
.center-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;text-align:center;}
.tabs{display:flex;gap:8px;padding:16px 0 0;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:999px;font-size:14px;font-weight:600;border:2px solid var(--border-2);background:#fff;color:var(--ink-soft);cursor:pointer;font-family:inherit;}
.tab.active{background:var(--green);color:#fff;border-color:var(--green);}
.panel{border:2px solid var(--border-2);border-radius:18px;padding:16px;background:#fff;}
.field{display:block;margin-bottom:10px;}
.field-label{font-size:12px;color:var(--ink-soft);display:block;margin-bottom:4px;font-weight:600;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.card-row{border:2px dashed var(--border-2);border-radius:14px;padding:10px;display:flex;gap:8px;margin-bottom:8px;}
.card-row .stack{flex:1;display:flex;flex-direction:column;gap:6px;}
.list-item{border:2px solid var(--border-2);border-radius:14px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;background:#fff;}
.badge{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:600;}
.badge.active{background:var(--green-100);color:var(--green-deep);}
.badge.revoked{background:var(--red-bg);color:var(--red-text);}
.small{font-size:12px;color:var(--ink-faint);}
.mono{font-family:monospace;}
.iconbtn{color:var(--ink-soft);cursor:pointer;background:none;border:none;padding:2px;font-family:inherit;font-size:12px;}
.created-box{background:var(--pink-100);border:2px solid var(--pink-200);border-radius:14px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:8px;font-size:13px;color:var(--pink-deep);}
.loginbox{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;}
.errtxt{color:var(--red-text);font-size:12px;margin:0;}
/* sidebar */
.sidebar-btn{background:#fff;border:2px solid var(--border-2);border-radius:999px;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
.backdrop{position:fixed;inset:0;background:rgba(44,58,51,.35);z-index:40;}
.sidebar{position:fixed;top:0;left:0;height:100vh;width:230px;background:#fff;z-index:50;box-shadow:3px 0 16px rgba(0,0,0,.12);padding:20px 16px;display:flex;flex-direction:column;gap:6px;}
.sidebar-link{text-align:left;background:none;border:none;font-family:inherit;font-size:14px;font-weight:600;color:var(--ink-soft);padding:10px 12px;border-radius:12px;cursor:pointer;}
.sidebar-link.active{background:var(--green-100);color:var(--green-deep);}
.swatch{width:28px;height:28px;border-radius:999px;border:2px solid #fff;box-shadow:0 0 0 2px var(--border-2);cursor:pointer;display:inline-block;}
.logo-preview{width:64px;height:64px;border-radius:999px;object-fit:cover;border:3px solid var(--border-2);}
.font-pick{padding:10px 12px;border:2px solid var(--border-2);border-radius:14px;margin-bottom:6px;cursor:pointer;}
.font-pick.active{border-color:var(--green);background:var(--green-100);}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDw_MX2DNYaFq9C89KJ2kVzWqLcDD9zHRs",
  authDomain: "flashcardnc.firebaseapp.com",
  databaseURL: "https://flashcardnc-default-rtdb.firebaseio.com",
  projectId: "flashcardnc",
  storageBucket: "flashcardnc.firebasestorage.app",
  messagingSenderId: "906246574006",
  appId: "1:906246574006:web:65469349b768c4312e7b17",
};
const CONFIG_NOT_SET = !firebaseConfig.apiKey || firebaseConfig.apiKey.includes("วางค่า");
let db, auth;
if (!CONFIG_NOT_SET) {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    auth = firebase.auth();
  } catch (e) {
    document.getElementById("app").innerHTML =
      '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px;text-align:center;font-family:sans-serif;">' +
      '<p style="font-weight:600;">เชื่อมต่อ Firebase ไม่สำเร็จ</p>' +
      '<pre style="font-size:11px;color:#c23a3a;white-space:pre-wrap;max-width:320px;">' + (e && e.message ? e.message : e) + '</pre>' +
      "</div>";
    throw e;
  }
}

const FONT_OPTIONS = [
  { key: "sriracha", label: "ลายมือลื่น ๆ", family: "'Sriracha', cursive" },
  { key: "charmonman", label: "ลายมือหวาน", family: "'Charmonman', cursive" },
  { key: "itim", label: "ลายมือกลมน่ารัก", family: "'Itim', cursive" },
  { key: "mali", label: "ลายมือมินิมอล", family: "'Mali', cursive" },
  { key: "pattaya", label: "ลายเส้นโค้งมน", family: "'Pattaya', cursive" },
  { key: "default", label: "ตัวพิมพ์ปกติ", family: "'Noto Serif Thai', serif" },
];
function fontFamilyFor(key) {
  const f = FONT_OPTIONS.find((x) => x.key === key);
  return f ? f.family : FONT_OPTIONS[0].family;
}
const DEFAULT_SETTINGS = {
  shopName: "ท่องได้ง่ายนิดเดียว",
  tagline: "แยกตู้ตามวิชา",
  logoDataUrl: "",
  bgMode: "preset",
  bgColor: "#FFFFFF",
  bgImageDataUrl: "",
  fontChoice: "sriracha",
  cardFrontColor: "#FFFDF8",
  cardBackColor: "#F4FBF7",
  contactLabel: "ทักซื้อ",
  contactUrl: "",
};
const DEFAULT_CATEGORIES = ["กฎหมายอาญา", "กฎหมายแพ่ง"];
const CATEGORY_EMOJI = ["📚", "✏️", "🌿", "🌸", "✨", "📝", "🍀", "💌"];

const state = {
  route: parseHash(),
  sets: {},
  links: {},
  categories: {},
  settings: { ...DEFAULT_SETTINGS },
  user: null,
  formOpen: false,
  draftSet: null,
  categoryEdit: null,
  loginErr: "",
  codeErr: "",
  adminTab: "sets",
  sidebarOpen: false,
  justCreatedCode: null,
  settingsDraft: null,
};

function parseHash() {
  const raw = location.hash.replace(/^#\/?/, "");
  if (raw.startsWith("v/")) return { page: "viewer", code: decodeURIComponent(raw.slice(2)).toUpperCase() };
  if (raw.startsWith("p/")) return { page: "preview", setId: decodeURIComponent(raw.slice(2)) };
  if (raw === "admin") return { page: "admin" };
  return { page: "catalog" };
}
window.addEventListener("hashchange", () => { state.route = parseHash(); state.codeErr = ""; render(); });

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c]));
}
function uid() { return Math.random().toString(36).slice(2, 10); }
function contactButtonHtml(extraStyle) {
  if (!state.settings.contactUrl) return "";
  return `<a class="btn btn-pink" style="text-decoration:none;display:inline-block;${extraStyle || ""}" href="${escapeHtml(state.settings.contactUrl)}" target="_blank" rel="noopener">${escapeHtml(state.settings.contactLabel || "ทักซื้อ")}</a>`;
}
const CODE_CHARS = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
function genCode(existingLinks) {
  let code;
  do {
    code = Array.from({ length: 7 }, () => CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)]).join("");
  } while (existingLinks && existingLinks[code]);
  return code;
}

function resizeImageToBase64(file, maxDim, cb) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = Math.round(h * (maxDim / w)); w = maxDim; }
      else if (h > maxDim) { w = Math.round(w * (maxDim / h)); h = maxDim; }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL("image/jpeg", 0.82));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function shellBgStyle() {
  const s = state.settings;
  if (s.bgMode === "color" && s.bgColor) return `style="background-color:${s.bgColor};background-image:none;"`;
  if (s.bgMode === "image" && s.bgImageDataUrl) return `style="background-image:url('${s.bgImageDataUrl}');background-size:cover;background-position:center;background-attachment:fixed;"`;
  return "";
}
function shellOpen() { return `<div class="shell" ${shellBgStyle()}>`; }

// ----- Firebase listeners -----
if (!CONFIG_NOT_SET) {
  db.ref("sets").on("value", (snap) => { state.sets = snap.val() || {}; if (!state.formOpen) render(); });
  db.ref("categories").on("value", (snap) => {
    state.categories = snap.val() || {};
    if (Object.keys(state.categories).length === 0) {
      const updates = {};
      DEFAULT_CATEGORIES.forEach((name) => { updates[uid()] = { name, createdAt: Date.now() }; });
      db.ref("categories").update(updates);
    }
    if (!state.formOpen) render();
  });
  db.ref("settings").on("value", (snap) => {
    const v = snap.val();
    if (v) state.settings = { ...DEFAULT_SETTINGS, ...v };
    else db.ref("settings").set(DEFAULT_SETTINGS);
    document.title = state.settings.shopName || DEFAULT_SETTINGS.shopName;
    if (!state.formOpen && state.adminTab !== "settings") render();
  });
  auth.onAuthStateChanged((user) => {
    state.user = user;
    if (user) {
      db.ref("links").on("value", (snap) => { state.links = snap.val() || {}; if (!state.formOpen) render(); });
    } else {
      db.ref("links").off();
      state.links = {};
    }
    render();
  });
}
function loadPublicLink(code, cb) {
  db.ref("links/" + code).once("value").then((snap) => cb(snap.val())).catch(() => cb(null));
}

function goCatalog() { location.hash = ""; }
function goAdmin() { location.hash = "#/admin"; }
function setAdminTab(t) { state.adminTab = t; state.sidebarOpen = false; render(); }
function toggleSidebar() { state.sidebarOpen = !state.sidebarOpen; render(); }

// ----- Auth -----
function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById("login-email").value.trim();
  const pass = document.getElementById("login-pass").value;
  state.loginErr = "";
  auth.signInWithEmailAndPassword(email, pass).catch(() => { state.loginErr = "เข้าสู่ระบบไม่สำเร็จ ตรวจอีเมล/รหัสผ่านอีกครั้ง"; render(); });
}
function doLogout() { auth.signOut(); goCatalog(); }

// ----- Categories CRUD -----
function addCategory() {
  const name = document.getElementById("cat-new-name").value.trim();
  if (!name) return;
  db.ref("categories/" + uid()).set({ name, createdAt: Date.now() });
  document.getElementById("cat-new-name").value = "";
}
function startEditCategory(id) { state.categoryEdit = { id, value: state.categories[id]?.name || "" }; render(); }
function cancelEditCategory() { state.categoryEdit = null; render(); }
function saveEditCategory() {
  const val = document.getElementById("cat-edit-input").value.trim();
  if (!val || !state.categoryEdit) return;
  db.ref("categories/" + state.categoryEdit.id + "/name").set(val).then(() => { state.categoryEdit = null; render(); });
}
function removeCategory(id) {
  if (!confirm("ลบหมวดหมู่นี้? ชุดบัตรในหมวดนี้จะย้ายไปกลุ่ม \"ไม่มีหมวดหมู่\"")) return;
  db.ref("categories/" + id).remove();
  Object.entries(state.sets).forEach(([sid, s]) => { if (s.categoryId === id) db.ref("sets/" + sid + "/categoryId").set(""); });
}

// ----- Sets CRUD -----
function readSetFormFromDom() {
  const cards = [];
  document.querySelectorAll("#cardRows .card-row").forEach((row) => {
    cards.push({ id: row.dataset.cid, front: row.querySelector(".cf").value, back: row.querySelector(".cb").value, preview: row.querySelector(".cp").checked });
  });
  return {
    id: state.draftSet?.id || null,
    categoryId: document.getElementById("f-categoryId")?.value || "",
    title: document.getElementById("f-title")?.value || "",
    description: document.getElementById("f-description")?.value || "",
    price: document.getElementById("f-price")?.value || "",
    cards,
  };
}
function startNewSet() {
  state.formOpen = true;
  state.draftSet = { id: null, categoryId: Object.keys(state.categories)[0] || "", title: "", description: "", price: "", cards: [{ id: uid(), front: "", back: "", preview: false }] };
  render();
}
function startEditSet(id) {
  const s = state.sets[id];
  if (!s) return;
  const cardsArr = Object.entries(s.cards || {}).map(([cid, c]) => ({ id: cid, front: c.front, back: c.back, preview: !!c.preview }));
  state.formOpen = true;
  state.draftSet = { id, categoryId: s.categoryId || "", title: s.title, description: s.description, price: String(s.price), cards: cardsArr.length ? cardsArr : [{ id: uid(), front: "", back: "", preview: false }] };
  render();
}
function cancelSetForm() { state.formOpen = false; state.draftSet = null; render(); }
function addCardRow() { state.draftSet = readSetFormFromDom(); state.draftSet.cards.push({ id: uid(), front: "", back: "", preview: false }); render(); }
function removeCardRow(i) { state.draftSet = readSetFormFromDom(); state.draftSet.cards.splice(i, 1); render(); }
function saveSet() {
  const f = readSetFormFromDom();
  if (!f.title.trim()) { alert("กรอกชื่อชุดบัตรก่อนนะ"); return; }
  const cardsObj = {};
  f.cards.filter((c) => c.front.trim() || c.back.trim()).forEach((c) => { cardsObj[c.id || uid()] = { front: c.front.trim(), back: c.back.trim(), preview: !!c.preview }; });
  const record = {
    categoryId: f.categoryId || "",
    title: f.title.trim(),
    description: f.description.trim(),
    price: Number(f.price) || 0,
    cards: cardsObj,
    createdAt: state.sets[f.id]?.createdAt || Date.now(),
  };
  const id = f.id || db.ref("sets").push().key;
  db.ref("sets/" + id).set(record).then(() => { state.formOpen = false; state.draftSet = null; render(); });
}
function removeSet(id) {
  if (!confirm("ลบชุดบัตรนี้และลิงก์ทั้งหมดที่ผูกกับมันหรือไม่?")) return;
  db.ref("sets/" + id).remove();
  Object.entries(state.links || {}).forEach(([code, l]) => { if (l.setId === id) db.ref("links/" + code).remove(); });
}

// ----- Links -----
function createLink() {
  const setId = document.getElementById("lk-set").value;
  const recipient = document.getElementById("lk-recipient").value.trim();
  const note = document.getElementById("lk-note").value.trim();
  if (!setId || !recipient) return;
  const code = genCode(state.links);
  db.ref("links/" + code).set({ setId, recipientName: recipient, note, createdAt: Date.now(), revoked: false }).then(() => { state.justCreatedCode = code; render(); });
}
function toggleRevoke(code) { const l = state.links[code]; if (!l) return; db.ref("links/" + code + "/revoked").set(!l.revoked); }
function copyLink(code) {
  const l = state.links[code];
  const set = l ? state.sets[l.setId] : null;
  const base = location.href.split("#")[0];
  const text = `ลิงก์ดูชุดบัตร "${set?.title || ""}"\nรหัสเข้าดู: ${code}\nเปิดเว็บแล้วกรอกรหัสนี้ที่ช่อง "มีรหัสเข้าดูจากผู้ขายแล้ว?" หรือเปิดลิงก์: ${base}#/v/${code}`;
  navigator.clipboard?.writeText(text).then(() => flashCopied(code)).catch(() => {});
}
function flashCopied(code) {
  const el = document.querySelector(`[data-copy="${code}"]`);
  if (el) { const old = el.textContent; el.textContent = "คัดลอกแล้ว"; setTimeout(() => { el.textContent = old; }, 1400); }
}

// ----- Settings -----
function ensureSettingsDraft() { if (!state.settingsDraft) state.settingsDraft = { ...state.settings }; }
function setBgMode(mode) { ensureSettingsDraft(); state.settingsDraft.bgMode = mode; render(); }
function pickFont(key) { ensureSettingsDraft(); state.settingsDraft.fontChoice = key; render(); }
function pickColor(hex) { ensureSettingsDraft(); state.settingsDraft.bgColor = hex; render(); }
function pickCardColor(side, hex) { ensureSettingsDraft(); state.settingsDraft[side === "front" ? "cardFrontColor" : "cardBackColor"] = hex; render(); }
function setContactPreset(type) {
  ensureSettingsDraft();
  const presets = {
    line: { label: "ทักไลน์", url: "https://line.me/ti/p/" },
    messenger: { label: "ทัก Facebook", url: "https://m.me/" },
    instagram: { label: "ทัก Instagram", url: "https://instagram.com/" },
    phone: { label: "โทรสั่งซื้อ", url: "tel:0" },

function handleLogoFile(input) {
  if (!input.files || !input.files[0]) return;
  resizeImageToBase64(input.files[0], 240, (dataUrl) => { ensureSettingsDraft(); state.settingsDraft.logoDataUrl = dataUrl; render(); });
}
function clearLogo() { ensureSettingsDraft(); state.settingsDraft.logoDataUrl = ""; render(); }
function handleBgImageFile(input) {
  if (!input.files || !input.files[0]) return;
  resizeImageToBase64(input.files[0], 1000, (dataUrl) => { ensureSettingsDraft(); state.settingsDraft.bgImageDataUrl = dataUrl; render(); });
}
function saveSettings() {
  ensureSettingsDraft();
  const draft = {
    ...state.settingsDraft,
    shopName: document.getElementById("set-shopname")?.value.trim() || DEFAULT_SETTINGS.shopName,
    tagline: document.getElementById("set-tagline")?.value.trim() || "",
    contactLabel: document.getElementById("set-contact-label")?.value.trim() || "ทักซื้อ",
    contactUrl: document.getElementById("set-contact-url")?.value.trim() || "",

  db.ref("settings").set(draft).then(() => { state.settings = draft; state.settingsDraft = null; alert("บันทึกการตั้งค่าแล้ว"); render(); });

// ----- Render -----
function render() {
  const el = document.getElementById("app");
  const r = state.route;
  if (r.page === "viewer") { renderViewerRoute(el, r.code); return; }
  if (r.page === "preview") { renderPreviewRoute(el, r.setId); return; }
  if (r.page === "admin") { el.innerHTML = state.user ? renderAdminDashboard() : renderAdminLogin(); return; }
  el.innerHTML = renderCatalog();
}

function brandLogo(size) {
  size = size || 44;
  if (state.settings.logoDataUrl) return `<img src="${state.settings.logoDataUrl}" class="logo-img" style="width:${size}px;height:${size}px;">`;
  return `<div class="seal" style="width:${size}px;height:${size}px;font-size:${Math.round(size * 0.45)}px;">📚</div>`;
}

function renderPreviewRoute(el, setId) {

        <a class="btn-ghost" style="cursor:pointer" onclick="addCardRow()">+ เพิ่มบัตร</a>
      </div>
      <p class="small" style="margin:0 0 8px;">ติ๊ก "ตัวอย่าง" ที่บัตรไหนก็ได้ ให้คนทั่วไปลองดูฟรีก่อนซื้อ</p>
      <div id="cardRows">
        ${f.cards.map((c, i) => `
        <div class="card-row" data-cid="${c.id}">
          <div class="stack">
            <input class="input cf" placeholder="หน้าบัตร #${i + 1} (คำถาม)" value="${escapeHtml(c.front)}">
            <input class="input cb" placeholder="หลังบัตร (คำตอบ)" value="${escapeHtml(c.back)}">
            <label class="row small" style="gap:6px;cursor:pointer;"><input type="checkbox" class="cp" ${c.preview ? "checked" : ""}> ตัวอย่าง (ดูฟรีก่อนซื้อ)</label>
          </div>
          <button class="iconbtn" onclick="removeCardRow(${i})">✕</button>
        </div>`).join("")}
      </div>
      <div class="row" style="gap:8px;padding-top:6px;">
        <button class="btn btn-primary" onclick="saveSet()">บันทึก</button>
        <button class="btn-ghost" onclick="cancelSetForm()">ยกเลิก</button>
      </div>
    </div>`;
  }
  const entries = Object.entries(state.sets);
  return `
    <button class="btn btn-pink" onclick="startNewSet()">+ เพิ่มชุดบัตรใหม่</button>
    <div style="margin-top:14px;">
      ${entries.length === 0 ? `<p class="small">ยังไม่มีชุดบัตร</p>` : entries.map(([id, s]) => `
      <div class="list-item">
        <div style="min-width:0;">
          <p class="small" style="color:#2D8158;font-weight:600;">${escapeHtml(state.categories[s.categoryId]?.name || "ไม่มีหมวดหมู่")}</p>
          <p style="font-size:14px;margin:2px 0;">${escapeHtml(s.title)}</p>
          <p class="small">${Object.keys(s.cards || {}).length} บัตร · ${s.price}฿</p>
        </div>
        <div class="row" style="gap:10px;flex-shrink:0;">
          <a class="btn-ghost" style="cursor:pointer" onclick="startEditSet('${id}')">แก้ไข</a>
          <a class="btn-ghost" style="cursor:pointer;color:#C23A3A;" onclick="removeSet('${id}')">ลบ</a>
        </div>
      </div>`).join("")}
    </div>`;
}

function renderManageLinks() {
  const setEntries = Object.entries(state.sets);
  const linkEntries = Object.entries(state.links || {}).sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0));
  return `
    <div class="panel" style="max-width:420px;">
      <p class="small" style="margin-top:0;">สร้างลิงก์ใหม่ให้คนใดคนหนึ่ง</p>
      <select id="lk-set" class="input" style="margin-bottom:8px;">
        ${setEntries.map(([id, s]) => `<option value="${id}">${escapeHtml(state.categories[s.categoryId]?.name || "ไม่มีหมวดหมู่")} · ${escapeHtml(s.title)}</option>`).join("")}
      </select>
      <input id="lk-recipient" class="input" placeholder="ชื่อ/ชื่อเล่นผู้รับ" style="margin-bottom:8px;">
      <input id="lk-note" class="input" placeholder="โน้ตส่วนตัว (ไม่บังคับ)" style="margin-bottom:10px;">
      <button class="btn btn-pink" onclick="createLink()">สร้างลิงก์</button>
      ${state.justCreatedCode ? `
      <div class="created-box">
        <span class="mono" style="letter-spacing:2px;">${state.justCreatedCode}</span>
        <button class="iconbtn" data-copy="${state.justCreatedCode}" onclick="copyLink('${state.justCreatedCode}')">คัดลอก</button>
      </div>` : ""}
    </div>
    <div style="margin-top:18px;">
      <p class="small">ลิงก์ทั้งหมด (${linkEntries.length})</p>
      ${linkEntries.length === 0 ? `<p class="small">ยังไม่มีลิงก์ที่สร้าง</p>` : linkEntries.map(([code, l]) => `
      <div class="list-item">
        <div style="min-width:0;">
          <p style="font-size:14px;margin:0;">${escapeHtml(l.recipientName)} <span class="small">· ${escapeHtml(state.sets[l.setId]?.title || "(ลบแล้ว)")}</span></p>
          <p class="small mono">${code} · ${new Date(l.createdAt).toLocaleDateString("th-TH")}</p>
        </div>
        <div class="row" style="gap:8px;flex-shrink:0;">
          <span class="badge ${l.revoked ? "revoked" : "active"}">${l.revoked ? "ปิดแล้ว" : "ใช้งานได้"}</span>
          <button class="iconbtn" data-copy="${code}" onclick="copyLink('${code}')">คัดลอก</button>
          <button class="iconbtn" onclick="toggleRevoke('${code}')">${l.revoked ? "เปิด" : "ปิด"}</button>
        </div>
      </div>`).join("")}
    </div>`;
}

function renderManageSettings() {
  ensureSettingsDraft();
  const d = state.settingsDraft;
  const swatches = ["#FFFFFF", "#FFF4F7", "#F0FBF5", "#FFE7EE", "#E4F7EC", "#FFD9E4"];
  return `
    <div class="panel" style="max-width:460px;margin-bottom:16px;">
      <label class="field"><span class="field-label">ชื่อร้าน</span>
        <input id="set-shopname" class="input" value="${escapeHtml(state.settings.shopName)}"></label>
      <label class="field"><span class="field-label">แทกไลน์ใต้ชื่อร้าน</span>
        <input id="set-tagline" class="input" value="${escapeHtml(state.settings.tagline)}"></label>
    </div>

    <div class="panel" style="max-width:460px;margin-bottom:16px;">
      <p class="field-label">โลโก้ร้าน</p>
      <div class="row" style="gap:14px;margin-bottom:10px;">
        ${d.logoDataUrl ? `<img src="${d.logoDataUrl}" class="logo-preview">` : `<div class="seal lg">📚</div>`}
        <div class="row" style="flex-direction:column;align-items:flex-start;gap:6px;">
          <label class="btn-ghost" style="cursor:pointer;">
            เลือกรูปโลโก้ <input type="file" accept="image/*" style="display:none" onchange="handleLogoFile(this)">
          </label>
          ${d.logoDataUrl ? `<a class="btn-ghost" style="cursor:pointer;color:#C23A3A;" onclick="clearLogo()">ลบโลโก้</a>` : ""}
        </div>
      </div>
    </div>

    <div class="panel" style="max-width:460px;margin-bottom:16px;">
      <p class="field-label">ปุ่มติดต่อสั่งซื้อ</p>
      <p class="small" style="margin:0 0 10px;">ใส่ลิงก์ไลน์/เพจ/IG/เบอร์โทรของคุณ จะมีปุ่มขึ้นใต้ชุดบัตรแต่ละชุด ให้คนซื้อทักมาได้เลย</p>
      <div class="row" style="gap:6px;margin-bottom:10px;flex-wrap:wrap;">
        <button class="tab" onclick="setContactPreset('line')">Line</button>
        <button class="tab" onclick="setContactPreset('messenger')">Messenger</button>
        <button class="tab" onclick="setContactPreset('instagram')">Instagram</button>
        <button class="tab" onclick="setContactPreset('phone')">เบอร์โทร</button>
      </div>
      <label class="field"><span class="field-label">ข้อความบนปุ่ม</span>
        <input id="set-contact-label" class="input" value="${escapeHtml(d.contactLabel)}" placeholder="ทักซื้อ"></label>
      <label class="field"><span class="field-label">ลิงก์ติดต่อ (วาง ID/เบอร์ต่อจากเทมเพลตที่เลือกไว้)</span>
        <input id="set-contact-url" class="input" value="${escapeHtml(d.contactUrl)}" placeholder="https://line.me/ti/p/xxxxx"></label>
      ${d.contactUrl ? `<p class="small">ตัวอย่างปุ่ม: <a class="btn btn-pink" style="text-decoration:none;display:inline-block;" href="${escapeHtml(d.contactUrl)}" target="_blank" rel="noopener">${escapeHtml(d.contactLabel || "ทักซื้อ")}</a></p>` : ""}
    </div>

    <div class="panel" style="max-width:460px;margin-bottom:16px;">
      <p class="field-label">พื้นหลัง</p>
      <div class="row" style="gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <button class="tab ${d.bgMode === "preset" ? "active" : ""}" onclick="setBgMode('preset')">ลายจุดพาสเทล</button>
        <button class="tab ${d.bgMode === "color" ? "active" : ""}" onclick="setBgMode('color')">สีพื้นเอง</button>
        <button class="tab ${d.bgMode === "image" ? "active" : ""}" onclick="setBgMode('image')">รูปของฉัน</button>
      </div>
      ${d.bgMode === "color" ? `
        <div class="row" style="gap:8px;flex-wrap:wrap;">
          ${swatches.map((hex) => `<span class="swatch" style="background:${hex};${d.bgColor === hex ? "box-shadow:0 0 0 2px #3FAE76;" : ""}" onclick="pickColor('${hex}')"></span>`).join("")}
          <input type="color" value="${d.bgColor}" oninput="pickColor(this.value)" style="width:36px;height:36px;border:none;border-radius:999px;">
        </div>` : ""}
      ${d.bgMode === "image" ? `
        <label class="btn-ghost" style="cursor:pointer;">เลือกรูปพื้นหลัง <input type="file" accept="image/*" style="display:none" onchange="handleBgImageFile(this)"></label>
        ${d.bgImageDataUrl ? `<p class="small" style="margin-top:6px;">เลือกรูปแล้ว ✓</p>` : ""}` : ""}
    </div>

    <div class="panel" style="max-width:460px;margin-bottom:16px;">
      <p class="field-label">สีการ์ด</p>
      <div class="row" style="gap:18px;flex-wrap:wrap;align-items:flex-start;">
        <div>
          <p class="small" style="margin:0 0 6px;">หน้าบัตร (คำถาม)</p>
          <input type="color" value="${d.cardFrontColor}" oninput="pickCardColor('front', this.value)" style="width:40px;height:40px;border:none;border-radius:999px;">
        </div>
        <div>
          <p class="small" style="margin:0 0 6px;">หลังบัตร (คำตอบ)</p>
          <input type="color" value="${d.cardBackColor}" oninput="pickCardColor('back', this.value)" style="width:40px;height:40px;border:none;border-radius:999px;">
        </div>
        <div style="flex:1;min-width:120px;">
          <p class="small" style="margin:0 0 6px;">ตัวอย่าง</p>
          <div style="display:flex;height:54px;border-radius:14px;overflow:hidden;border:2px solid var(--border-2);">
            <div style="flex:1;background:${d.cardFrontColor};display:flex;align-items:center;justify-content:center;font-size:11px;color:#2C3A33;">หน้า</div>
            <div style="flex:1;background:${d.cardBackColor};display:flex;align-items:center;justify-content:center;font-size:11px;color:#2C3A33;">หลัง</div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" style="max-width:460px;margin-bottom:16px;">
      <p class="field-label">ฟอนต์หัวข้อ</p>
      ${FONT_OPTIONS.map((f) => `
        <div class="font-pick ${d.fontChoice === f.key ? "active" : ""}" onclick="pickFont('${f.key}')">
          <span style="font-family:${f.family};font-size:18px;">${escapeHtml(state.settings.shopName || "ตัวอย่างชื่อร้าน")}</span>
          <span class="small" style="margin-left:8px;">${f.label}</span>
        </div>`).join("")}
    </div>

    <button class="btn btn-primary" onclick="saveSettings()">บันทึกการตั้งค่า</button>
  `;
}

</script>
</body>
</html>
